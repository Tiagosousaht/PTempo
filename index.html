<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
   <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MeuAcerto - Calculadora de Rescisão</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
</head>
<body>

<header>
    <div class="logo">Meu<span>Acerto</span></div>
</header>

<main>
    <section class="hero">
        <h1>Sua Rescisão Completa</h1>
        <p>Cálculo de verbas, FGTS total e multa rescisória.</p>
    </section>

    <section class="calculator">
        <div class="card">
            <div class="input-group">
                <label>Salário Bruto (R$)</label>
                <input type="number" id="salario" placeholder="Ex: 3500">
            </div>

            <div class="row">
                <div class="input-group">
                    <label>Admissão</label>
                    <input type="date" id="admissao">
                </div>
                <div class="input-group">
                    <label>Demissão</label>
                    <input type="date" id="demissao">
                </div>
            </div>

            <div class="input-group">
                <label>Motivo da Saída</label>
                <select id="tipo">
                    <option value="sem">Demissão sem justa causa</option>
                    <option value="pedido">Pedido de demissão</option>
                    <option value="justa">Justa causa</option>
                </select>
            </div>

            <div class="input-group">
                <label>Aviso Prévio</label>
                <select id="aviso">
                    <option value="trabalhado">Trabalhado</option>
                    <option value="indenizado">Indenizado (pago pela empresa)</option>
                    <option value="nao_cumprido">Não cumprido (descontado)</option>
                </select>
            </div>

            <button onclick="calcular()" class="btn-main">Calcular Meu Acerto</button>

            <div id="resultado"></div>

            <button id="btnPDF" onclick="gerarPDF()" class="btn-pdf" disabled>
                📄 Baixar Relatório Detalhado (PDF)
            </button>
        </div>
    </section>
</main>

<script src="script.js"></script>
</body>
</html>
